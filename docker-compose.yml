version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=greenloop
      - POSTGRES_USER=greenloop_user
      - POSTGRES_PASSWORD=greenloop_secure_pass_123
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=django-insecure-docker-composed-default-key-123456789
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - DATABASE_URL=postgres://greenloop_user:greenloop_secure_pass_123@db:5432/greenloop
      - ENCRYPTION_KEY=z7yK9Hq2Vp5bT1s_Y3wN8mKxL-Z4dC6fR7gB0hJ1kL8=
      - HMAC_SECRET_KEY=hmac-secret-signature-verification-token-key-32-chars
      - NVIDIA_MOCK_MODE=True
    depends_on:
      - db

volumes:
  postgres_data:
