{% extends 'base.html' %}

{% block content %}
<div class="min-h-[75vh] flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8 relative">
    <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-emerald-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="max-w-md w-full space-y-8 glass-card p-8 rounded-2xl border border-slate-800 shadow-2xl relative">
        <div class="text-center">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-emerald-500 to-cyan-500 p-0.5 mx-auto flex items-center justify-center shadow-lg shadow-emerald-500/10">
                <div class="w-full h-full bg-slate-950 rounded-[10px] flex items-center justify-center">
                    <i data-feather="lock" class="w-6 h-6 text-emerald-400"></i>
                </div>
            </div>
            <h2 class="mt-6 text-3xl font-extrabold text-white tracking-tight">Choose New Password</h2>
            <p class="mt-2 text-sm text-slate-400">
                Please enter your new password below.
            </p>
        </div>

        <form class="mt-8 space-y-6" method="POST" hx-boost="true" hx-target="body">
            {% csrf_token %}
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="id_password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">New Password * (min 12 chars)</label>
                    <input id="id_password" name="password" type="password" minlength="12" required class="appearance-none rounded-xl relative block w-full px-4 py-3 bg-slate-950/80 border border-slate-800 placeholder-slate-600 text-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-sm transition-all" placeholder="••••••••••••">
                </div>
                <div>
                    <label for="id_confirm_password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Confirm New Password</label>
                    <input id="id_confirm_password" name="confirm_password" type="password" minlength="12" required class="appearance-none rounded-xl relative block w-full px-4 py-3 bg-slate-950/80 border border-slate-800 placeholder-slate-600 text-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-sm transition-all" placeholder="••••••••••••">
                </div>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-slate-950 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 shadow-lg shadow-emerald-500/10 transition-all hover:scale-[1.01]">
                    Save Password
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
