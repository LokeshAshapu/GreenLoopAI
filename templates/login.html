{% extends 'base.html' %}

{% block content %}
<div class="min-h-[75vh] flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8 relative">
    <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-emerald-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="max-w-md w-full space-y-8 glass-card p-8 rounded-2xl border border-slate-800 shadow-2xl relative">
        <div class="text-center">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-tr from-emerald-500 to-cyan-500 p-0.5 mx-auto flex items-center justify-center shadow-lg shadow-emerald-500/10">
                <div class="w-full h-full bg-slate-950 rounded-[10px] flex items-center justify-center">
                    <i data-feather="repeat" class="w-6 h-6 text-emerald-400"></i>
                </div>
            </div>
            <h2 class="mt-6 text-3xl font-extrabold text-white tracking-tight">Sign in to your account</h2>
            <p class="mt-2 text-sm text-slate-400">
                Or
                <a href="{% url 'signup' %}" class="font-medium text-emerald-400 hover:text-emerald-300 transition-colors">create a new account</a>
            </p>
        </div>

        <form class="mt-8 space-y-6" action="{% url 'login' %}" method="POST" hx-boost="true" hx-target="body">
            {% csrf_token %}
            <input type="hidden" name="remember" value="true">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="id_username" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Username</label>
                    <input id="id_username" name="username" type="text" required class="appearance-none rounded-xl relative block w-full px-4 py-3 bg-slate-950/80 border border-slate-800 placeholder-slate-600 text-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-sm transition-all" placeholder="Enter username">
                </div>
                <div>
                    <label for="id_password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                    <input id="id_password" name="password" type="password" required class="appearance-none rounded-xl relative block w-full px-4 py-3 bg-slate-950/80 border border-slate-800 placeholder-slate-600 text-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-sm transition-all" placeholder="••••••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between text-xs">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-emerald-600 focus:ring-emerald-500 border-slate-800 rounded bg-slate-950">
                    <label for="remember-me" class="ml-2 block text-slate-400">Remember me</label>
                </div>
                <a href="{% url 'forgot_password' %}" class="font-medium text-emerald-400 hover:text-emerald-300">Forgot password?</a>
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-slate-950 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 shadow-lg shadow-emerald-500/10 transition-all hover:scale-[1.01]">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i data-feather="lock" class="w-4 h-4 text-emerald-950 group-hover:text-emerald-900 transition-colors"></i>
                    </span>
                    Sign In
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
